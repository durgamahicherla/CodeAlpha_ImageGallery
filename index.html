<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<div class="filters">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
    <button onclick="filterImages('cars')">Cars</button>
    <button onclick="filterImages('space')">Space</button>
</div>

<div class="gallery">

    <div class="image nature">
        <img src="nature1.jpg.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image nature">
        <img src="nature2.jpg.jpg" onclick="openLightbox(this.src)">
    </div>

    <!--<div class="image nature">
        <img src="nature3.jpg.jpg" onclick="openLightbox(this.src)">
    </div>-->

    <div class="image city">
        <img src="city1.jpg.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image city">
        <img src="city2.jpg.jpg" onclick="openLightbox(this.src)">
    </div>

    <!--<div class="image city">
        <img src="city3.jpg.jpg" onclick="openLightbox(this.src)">
    </div>-->
    
    <div class="image car">
        <img src="car1.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image car">
        <img src="car2.jpg" onclick="openLightbox(this.src)">
    </div>

    <!--<div class="image city">
        <img src="car3.jpg" onclick="openLightbox(this.src)">
    </div>-->

    <div class="image animal">
        <img src="animal1.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image animal">
        <img src="animal2.jpg" onclick="openLightbox(this.src)">
    </div>

    <!--<div class="image city">
        <img src="animal3.jpg" onclick="openLightbox(this.src)">
    </div>-->

    <div class="image space">
        <img src="space1.jpg" onclick="openLightbox(this.src)">
    </div>

    <div class="image space">
        <img src="space2.jpg" onclick="openLightbox(this.src)">
    </div>

    <!--<div class="image city">
        <img src="space3.jpg" onclick="openLightbox(this.src)">
    </div>-->

</div>

<div id="lightbox">
    <span onclick="closeLightbox()">×</span>
    <img id="lightbox-img">
</div>

<script src="script.js"></script>

</body>
</html>
